services:
  qdrant:
    image: qdrant/qdrant:v1.13.2
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-lc", "exec 3<>/dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./.env.docker
    environment:
      QDRANT_HOST: http://qdrant:6333
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8000/healthz >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy

  tesseract:
    build:
      context: ./server/app
      dockerfile: Dockerfile.tesseract
    working_dir: /work
    volumes:
      - ./server/app:/work
    entrypoint: ["tesseract"]
    profiles:
      - ocr

volumes:
  qdrant_data:
